name: Check River Permits

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e . && playwright install chromium --with-deps

      - name: Download previous state
        uses: actions/cache@v4
        with:
          path: data/state.json
          key: permit-state-${{ github.run_id }}
          restore-keys: |
            permit-state-

      - name: Check permits
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RIVERS: "middle_fork,main_salmon,selway"
          JITTER_MAX_SECONDS: "5"
          STATE_DB_PATH: "data/state.json"
          LOG_LEVEL: "INFO"
          AUTO_BOOK: ${{ secrets.AUTO_BOOK }}
          REC_GOV_USERNAME: ${{ secrets.REC_GOV_USERNAME }}
          REC_GOV_PASSWORD: ${{ secrets.REC_GOV_PASSWORD }}
        run: permit-sniper check
